name: CI Pipeline

on:
  push:  # 每次 push 時自動執行
    branches:
      - '**'  # 所有分支都觸發

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  ci:
    name: TypeCheck, Format & Test
    runs-on: ubuntu-latest  # 在 GitHub 的 Ubuntu 伺服器上執行

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Prettier check
        run: npm run format:check

      - name: Run tests
        run: npm run test:ci
        if: always()

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()  # 不管成功失敗都執行
        with:
          files: |
            test-results/**/*.xml
